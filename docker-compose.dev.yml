# ========================================
# Docker Compose Development Overrides
# ========================================
# This file extends docker-compose.yml with development-specific configuration
# Automatically loaded in development mode via Makefile
#
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # Expose Redis port for debugging tools
  redis:
    ports:
      - '${REDIS_PORT:-6379}:6379'

  # Expose DB port for debugging tools
  db:
    ports:
      - '${POSTGRES_PORT:-5432}:5432'

  # Mount source code for hot-reload in development
  server:
    volumes:
      - ./server:/app
      - ./data:/data
    ports:
      - "${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"

  # Enable HMR (Hot Module Replacement) for Vue/Vite in development
  client:
    volumes:
      - ./client:/app
      # Preserve node_modules from image
      - /app/node_modules
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    environment:
      # Override port for Vite dev server (default 5173)
      VITE_PORT: 5173
      # Enable polling for file watching in Docker volumes
      CHOKIDAR_USEPOLLING: 'true'

  # Development Caddy config
  caddy:
    environment:
      # Route to Vite dev server instead of production port
      - CLIENT_PORT=5173
