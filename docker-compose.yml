services:
  db:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-foolstack}_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-${PROJECT_NAME:-foolstack}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-${PROJECT_NAME:-foolstack}}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-${PROJECT_NAME:-foolstack}} -d ${POSTGRES_DB:-${PROJECT_NAME:-foolstack}}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-foolstack}_redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save "900 1"
      --save "300 10"
      --save "60 10000"
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: ${ENVIRONMENT:-development}
    container_name: ${PROJECT_NAME:-foolstack}_server
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      SERVER_PORT: ${SERVER_PORT:-8000}
      POSTGRES_DB: ${POSTGRES_DB:-${PROJECT_NAME:-foolstack}}
      POSTGRES_USER: ${POSTGRES_USER:-${PROJECT_NAME:-foolstack}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
    volumes:
      - ./data/logs:/data/logs
      - ./data/staticfiles:/data/staticfiles
      - ./data/mediafiles:/data/mediafiles
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:$${SERVER_PORT:-8000}/api/ping/']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: ${ENVIRONMENT:-development}
    container_name: ${PROJECT_NAME:-foolstack}_client
    env_file: .env
    environment:
      CLIENT_PORT: ${CLIENT_PORT:-5173}
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  caddy:
    image: caddy:2-alpine
    container_name: ${PROJECT_NAME:-foolstack}_caddy
    ports:
      - '${CADDY_HTTP_PORT:-80}:80'
      - '${CADDY_HTTPS_PORT:-443}:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
      - ./data/staticfiles:/staticfiles:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SERVER_PORT=${SERVER_PORT:-8000}
      - CLIENT_PORT=${CLIENT_PORT:-5173}
    depends_on:
      - server
      - client
    restart: unless-stopped
    networks:
      - app_network

volumes:
  redis_data:
    name: ${PROJECT_NAME:-foolstack}_redis_data
  db_data:
    name: ${PROJECT_NAME:-foolstack}_db_data

networks:
  app_network:
    name: ${PROJECT_NAME:-foolstack}_network
    driver: bridge
