services:
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-foolstack}_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: ${ENVIRONMENT:-development}
    container_name: ${PROJECT_NAME:-foolstack}_server
    env_file: .env
    environment:
      REDIS_HOST: redis
    volumes:
      - ./data/logs:/data/logs
      - ./data/staticfiles:/data/staticfiles
      - ./data/mediafiles:/data/mediafiles
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/ping/']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_network

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: ${ENVIRONMENT:-development}
    container_name: ${PROJECT_NAME:-foolstack}_worker
    env_file: .env
    environment:
      REDIS_HOST: redis
    volumes:
      - ./data/logs:/data/logs
      - ./data/mediafiles:/data/mediafiles
    command: python -m celery -A core worker -l ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: ${ENVIRONMENT:-development}
    container_name: ${PROJECT_NAME:-foolstack}_client
    env_file: .env
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  caddy:
    image: caddy:2-alpine
    container_name: ${PROJECT_NAME:-foolstack}_caddy
    ports:
      - '${CADDY_PORT:-80}:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
      - ./data/staticfiles:/staticfiles:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CLIENT_PORT=${CLIENT_PORT:-80}
    depends_on:
      - server
      - client
    restart: unless-stopped
    networks:
      - app_network

volumes:
  redis_data:
    name: ${PROJECT_NAME:-foolstack}_redis_data

networks:
  app_network:
    name: ${PROJECT_NAME:-foolstack}_network
    driver: bridge
